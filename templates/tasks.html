<!DOCTYPE html>
<html>
<head>
    <title>Task Calendar</title>

    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.19/index.global.min.css" rel="stylesheet">

    <style>
        body{
            margin:20px;
            font-family:Arial, sans-serif;
        }

        #calendar{
            max-width:1000px;
            margin:auto;
        }

      #menu{
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);

    width:220px;
    background:#fff;
    padding:20px;

    border:1px solid #333;
    border-radius:10px;

    z-index:99999;
    pointer-events:auto;
}

#menu button{
    display:block;
    width:100%;
    margin:10px 0;
    padding:10px;
    cursor:pointer;
}

#deleteinfo{
    display:none;
    height:15vh;
    width:10vw;
    border-radius:2px;
    padding:5px;
    z-index:999999;
    border: 1px solid #333;
    position:fixed;
    top:57%;
    left:60%;
}

#insertinfo{
    display:none;
    height:15vh;
    width:10vw;
    border-radius:2px;
    padding:5px;
    z-index:999999;
    border: 1px solid #333;
    position:fixed;
    top:60%;
    left:60%;
    opacity:1;
}


#updateinfo{
    display:none;
    height:15vh;
    width:10vw;
    border-radius:2px;
    padding:5px;
    z-index:999999;
    border: 1px solid #333;
    position:fixed;
    top:60%;
    left:60%;
    opacity:1;
}





    </style>
</head>

<body>

    <div id="calendar"></div>

    <aside>
       <div id="message">

       </div>
    </aside>


    <div id="deleteinfo">
        <input type ="text" id="taskToDelete" placeholder="Enter Task to Delete">
        <button id="deleteTask" type="button" onclick="deleteTask()">Delete Task</button>
    </div>

    <div id="insertinfo">
        <input type ="text" id="taskToInsert" placeholder="Enter Task to Insert">
        <button id="insertTask" type="button" onclick="insertTask()">Insert Task</button>
    </div>

    <div id="updateinfo">
        <input type ="text" id="taskToUpdate" placeholder="Enter Task">
        <input type="text" id="status" placeholder="Enter status">
        <button id="updateTask" type="button" onclick="updateTask()">Update Status</button>
    </div>


    <div id="menu">

        <h3 id="selectedDate"></h3>

        <button id="view" type="button">View Tasks</button>

        <button id="insert" type="button">Insert Task</button>

        <button id="update" type="button">Update Task</button>

        <button id="delete" type="button" >Delete Task</button>

        <button type="button" onclick="closeMenu()">Close</button>

    </div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.19/index.global.min.js"></script>

<script>

document.addEventListener('DOMContentLoaded', function() {

    const calendarEl = document.getElementById('calendar');

    const calendar = new FullCalendar.Calendar(calendarEl, {

        initialView: 'dayGridMonth',

        selectable: true,

        dateClick: function(info) {

            document.getElementById("selectedDate")
            .innerText = info.dateStr;

            document.getElementById("menu")
            .style.display = "block";
        }
    });

    calendar.render();
});

function closeMenu(){

    document.getElementById("menu")
    .style.display = "none";
    document.getElementById("deleteinfo").style.display="none";
    document.getElementById("insertinfo").style.display="none"
}


// view operations 

const viewBTN = document.getElementById("view");


function viewTasks() {

    const selectedDate =
        document.getElementById("selectedDate").innerText;

    fetch("/view_tasks?date=" + selectedDate)

        .then(response => {

            if (!response.ok) {
                throw new Error("Failed to fetch tasks");
            }

            return response.json();

        })

        .then(tasks => {

            console.log(tasks);

            const messageBox = document.getElementById("message");

            messageBox.innerHTML = "";

            if (tasks.length === 0) {

                messageBox.innerHTML = "<h3>No Tasks Found</h3>";
                return;

            }

            tasks.forEach(task => {

                messageBox.innerHTML += `
                    <div style="border:1px solid #ccc;
                                padding:10px;
                                margin:10px 0;
                                border-radius:8px;">

                        <h3>${task.task}</h3>

                        <p><b>Date:</b> ${task.date}</p>

                        <p><b>Completed:</b> ${task.completed}</p>

                    </div>
                `;

            });

        })

        .catch(error => {

            console.error("Error:", error);

        });

}


viewBTN.addEventListener("click", viewTasks);

// Delete Operation 

const deleteBTN = document.getElementById("delete");

deleteBTN.addEventListener("click",function(){

document.getElementById("deleteinfo").style.display="block";
document.getElementById('insertinfo').style.display='none';
document.getElementById("updateinfo").style.display="none";

})


function deleteTask(){
    const taskToDelete= document.getElementById("taskToDelete").value;

    fetch("/delete_task?task=" + taskToDelete+"&date=" + document.getElementById("selectedDate").innerText, {
        method: "DELETE"
    }).then(response =>{
        if (!response.ok) {
            throw new Error("Failed to delete task");
        }

        return response.json();
    }).then(result =>{
        console.log(result);
        alert("Task Deleted Successfully");
        document.getElementById("deleteinfo").style.display="none";
    }).catch(error =>{
        console.error("Error:", error);
    })
    
}


// Insert Operation 

const insertBTN=document.getElementById("insert");

insertBTN.addEventListener("click",function(){
    document.getElementById('insertinfo').style.display='block';
    document.getElementById('deleteinfo').style.display='none';
    document.getElementById("updateinfo").style.display="none";

})

function insertTask(){
    const taskToInsert = document.getElementById('taskToInsert').value;

    

    fetch("/insert_task?task=" + taskToInsert + "&date="+document.getElementById('selectedDate').innerText,{
        method:'POST'
    }).then(response =>{
        if (!response.ok) {
            throw new Error("Failed to delete task");
        }

        return response.json();
    }).then(result =>{
        viewBTN
        alert("Task Inserted Successfully");
        document.getElementById("insertinfo").style.display="none";
        viewTasks();
    })
}



// Update Operation 

const updateBTN=document.getElementById("update");

updateBTN.addEventListener("click",function(){
    document.getElementById("updateinfo").style.display="block";
    document.getElementById('deleteinfo').style.display='none';
    document.getElementById('insertinfo').style.display='none';

})

function updateTask(){
    const taskToUpdate=document.getElementById('taskToUpdate').value;
    const status=document.getElementById('status').value;
    
    fetch(
    "/update_task?task=" + taskToUpdate +
    "&status=" + status +
    "&date=" + document.getElementById("selectedDate").innerText,
    {
        method: "PUT"
    }
)
    .then(response =>{
        if (!response.ok) {
            throw new Error("Failed to Upddate task");
        }

        return response.json();
    }).then(result =>{
        console.log(result);
        alert("Task Updated Successfully");
        document.getElementById("updateinfo").style.display="none";
    }).catch(error =>{
        console.error("Error:", error);
    })}

</script>

</body>
</html>
