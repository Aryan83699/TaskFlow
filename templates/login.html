<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="static/styles/login.css" class="css">
    
</head>
<body>
    <form method="post" action="/login">

        <video autoplay muted loop playsinline class="bgvideo">
    <source src="{{ url_for('static', filename='videos/bg.mp4') }}" type="video/mp4">
</video>

        <div class="container">
            <div>
                <h1 style="padding:15px;">Login</h1>
                <p style="padding-left: 15px; padding-top: 20px ;font-size: 18px; padding-bottom: 2px; margin-bottom: 5px;">Email Address</p>
                <input class='input' type="email" name="Email" style="margin-left: 15px;padding:5px ; padding-right: 12vw; border-radius: 6px;" required placeholder="singharyanxxx@gmail.com" autofocus >
                

                <p style="padding-left: 15px; padding-top: 30px ;font-size: 18px; padding-bottom: 2px; margin-bottom: 5px; margin-top: 0px ;">Password</p>
                <input class="input" type="password" name="Password" style="margin-left: 15px;padding:5px ; padding-right: 12vw;border-radius: 6px;" required placeholder="Aryan@3007" minlength="5" >
                <br><br>

                <div class="btn-container">
                        <input id='submitButton' type="submit" value="Login" style="padding-left: 8vw;padding-right: 8vw; font-size: 21px;margin:auto;text-align: center; padding-top: 5px ; padding-bottom: 5px; margin-top: 25px; border-radius: 7px; border-color: white; background-color: #231242; color:white ; font-weight: 700 ; font-family: Arial, Helvetica, sans-serif;" >
                </div>
                <br>
                <p style="padding-left: 15px;font-weight: 500;">
                    Don't Have Account ? 
                </p>
                <a  style="font-weight: 700;font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;padding-left: 15px;;" 
                href="/login">Sign Up</a>
                <br>
                <h1 id="brand" align="center" style="font-style: italic;font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;padding-top: 8px;">TaskFlow</h1>
            </div>
        </div>
    </form>

{% with messages = get_flashed_messages() %}
    {% if messages %}
        <ul>
        {% for message in messages %}
            <li>{{ message }}</li>
        {% endfor %}
        </ul>
    {% endif %}
{% endwith %}

<script src="{{ url_for('static', filename='js/script.js') }}" defer></script>
</body>
</html>
